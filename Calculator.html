<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced Professional Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
  linear-gradient(rgba(15,23,42,0.85),rgba(15,23,42,0.9)),
  url('https://images.unsplash.com/photo-1515879218367-8466d910aaa4?q=80&w=1974&auto=format&fit=crop');

  background-size:cover;
  background-position:center;
  overflow:hidden;
  padding:20px;
}

/* PARTICLES */

#particles-js{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-1;
}

/* CALCULATOR */

.calculator{
  width:400px;
  padding:25px;
  border-radius:30px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.15);

  box-shadow:
  0 10px 40px rgba(0,0,0,0.5),
  0 0 25px rgba(56,189,248,0.3);
}

/* TOP */

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  color:white;
}

.title{
  font-size:1.2rem;
  font-weight:600;
  letter-spacing:1px;
  color:#38bdf8;
}

.mode-btn{
  padding:10px 16px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:#38bdf8;
  color:white;
  font-size:0.9rem;
  font-weight:600;
  transition:0.3s;
}

.mode-btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #38bdf8;
}

/* HISTORY */

#history{
  height:25px;
  text-align:right;
  color:#cbd5e1;
  font-size:0.9rem;
  margin-bottom:5px;
  overflow:hidden;
}

/* DISPLAY */

#display{
  width:100%;
  height:85px;
  border:none;
  outline:none;
  border-radius:20px;
  background:#ffffff15;
  color:white;
  text-align:right;
  padding:20px;
  font-size:2.3rem;
  margin-bottom:22px;
  font-weight:600;
  box-shadow:inset 0 0 10px rgba(255,255,255,0.05);
}

/* BUTTONS */

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
}

button{
  height:68px;
  border:none;
  border-radius:18px;
  cursor:pointer;
  font-size:1.1rem;
  font-weight:600;
  transition:0.2s ease;
}

button:hover{
  transform:translateY(-4px);
}

/* TYPES */

.number{
  background:#ffffff10;
  color:white;
}

.operator{
  background:#2563eb;
  color:white;
}

.special{
  background:#f97316;
  color:white;
}

.equal{
  background:#22c55e;
  color:white;
  grid-column:span 2;
}

.clear{
  background:#ef4444;
  color:white;
}

/* SCIENTIFIC */

.scientific{
  display:none;
  margin-top:16px;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
}

.show-scientific{
  display:grid;
}

/* FOOTER */

.footer{
  margin-top:20px;
  text-align:center;
  color:#cbd5e1;
  font-size:0.85rem;
}

/* RESPONSIVE */

@media(max-width:450px){

  .calculator{
    width:100%;
    padding:20px;
  }

  button{
    height:62px;
    font-size:1rem;
  }

  #display{
    font-size:1.8rem;
    height:75px;
  }
}

</style>

</head>

<body>

<!-- PARTICLES -->
<div id="particles-js"></div>

<div class="calculator">

  <div class="top">

    <div class="title">
      <i class="fas fa-calculator"></i> PRO CALCULATOR
    </div>

    <button class="mode-btn" onclick="toggleScientific()">
      Scientific
    </button>

  </div>

  <div id="history"></div>

  <input type="text" id="display" readonly>

  <!-- NORMAL BUTTONS -->

  <div class="buttons">

    <button class="clear" onclick="clearDisplay()">AC</button>

    <button class="special" onclick="deleteLast()">⌫</button>

    <button class="special" onclick="appendValue('%')">%</button>

    <button class="operator" onclick="appendValue('/')">÷</button>

    <button class="number" onclick="appendValue('7')">7</button>

    <button class="number" onclick="appendValue('8')">8</button>

    <button class="number" onclick="appendValue('9')">9</button>

    <button class="operator" onclick="appendValue('*')">×</button>

    <button class="number" onclick="appendValue('4')">4</button>

    <button class="number" onclick="appendValue('5')">5</button>

    <button class="number" onclick="appendValue('6')">6</button>

    <button class="operator" onclick="appendValue('-')">−</button>

    <button class="number" onclick="appendValue('1')">1</button>

    <button class="number" onclick="appendValue('2')">2</button>

    <button class="number" onclick="appendValue('3')">3</button>

    <button class="operator" onclick="appendValue('+')">+</button>

    <button class="special" onclick="appendValue('.')">.</button>

    <button class="number" onclick="appendValue('0')">0</button>

    <button class="equal" onclick="calculate()">=</button>

  </div>

  <!-- SCIENTIFIC -->

  <div class="scientific" id="scientific">

    <button class="special" onclick="square()">x²</button>

    <button class="special" onclick="cube()">x³</button>

    <button class="special" onclick="sqrtCalc()">√</button>

    <button class="special" onclick="power()">xʸ</button>

    <button class="special" onclick="sinCalc()">sin</button>

    <button class="special" onclick="cosCalc()">cos</button>

    <button class="special" onclick="tanCalc()">tan</button>

    <button class="special" onclick="logCalc()">log</button>

    <button class="special" onclick="piValue()">π</button>

    <button class="special" onclick="eValue()">e</button>

    <button class="special" onclick="appendValue('(')">(</button>

    <button class="special" onclick="appendValue(')')">)</button>

  </div>

  <div class="footer">
    Designed by Loshitha ✨
  </div>

</div>

<!-- PARTICLES JS -->

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>

particlesJS("particles-js",{

  particles:{
    number:{value:70},

    color:{value:"#38bdf8"},

    shape:{type:"circle"},

    opacity:{value:0.5},

    size:{value:3},

    move:{
      enable:true,
      speed:2
    }
  }

});

</script>

<!-- CALCULATOR JS -->

<script>

const display = document.getElementById("display");
const history = document.getElementById("history");

function appendValue(value){
  display.value += value;
}

function clearDisplay(){
  display.value = "";
  history.innerText = "";
}

function deleteLast(){
  display.value = display.value.slice(0,-1);
}

function calculate(){

  try{

    history.innerText = display.value;

    display.value = eval(display.value);

  }

  catch{

    display.value = "Error";

  }
}

function square(){
  display.value = Math.pow(eval(display.value),2);
}

function cube(){
  display.value = Math.pow(eval(display.value),3);
}

function sqrtCalc(){
  display.value = Math.sqrt(eval(display.value));
}

function power(){
  display.value += "**";
}

function sinCalc(){
  display.value =
  Math.sin(eval(display.value) * Math.PI/180).toFixed(5);
}

function cosCalc(){
  display.value =
  Math.cos(eval(display.value) * Math.PI/180).toFixed(5);
}

function tanCalc(){
  display.value =
  Math.tan(eval(display.value) * Math.PI/180).toFixed(5);
}

function logCalc(){
  display.value =
  Math.log10(eval(display.value)).toFixed(5);
}

function piValue(){
  display.value += Math.PI.toFixed(8);
}

function eValue(){
  display.value += Math.E.toFixed(8);
}

function toggleScientific(){

  document
  .getElementById("scientific")
  .classList.toggle("show-scientific");

}

/* KEYBOARD SUPPORT */

document.addEventListener("keydown",(e)=>{

  if(
    (e.key >=0 && e.key <=9) ||
    ['+','-','*','/','.','%','(',')']
    .includes(e.key)
  ){

    appendValue(e.key);

  }

  else if(e.key === "Enter"){

    calculate();

  }

  else if(e.key === "Backspace"){

    deleteLast();

  }

  else if(e.key === "Escape"){

    clearDisplay();

  }

});

</script>

</body>
</html>
